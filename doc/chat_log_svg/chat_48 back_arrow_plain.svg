  <!-- AFTER -->
  <text x="360" y="44" font-family="monospace" font-size="11" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER</text>

  <rect x="270" y="54" width="180" height="50" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="360" y="70" font-family="monospace" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">header</text>

  <text x="295" y="90" font-family="monospace" font-size="9" fill="#555">&#x2196; scenarios</text>

  <text x="360" y="122" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">plain text + &#x2196; arrow</text>
  <text x="360" y="134" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">no bg, no underline</text>

  <!-- CSS note -->
