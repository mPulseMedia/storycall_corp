<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" style="background:#fff">
  <rect x="0" y="0" width="480" height="200" fill="#fff"/>

  <text x="240" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_47 scenario_border</text>

  <!-- BEFORE -->
  <text x="120" y="42" font-family="monospace" font-size="11" text-anchor="middle" fill="#999" font-weight="bold">BEFORE</text>

  <rect x="30" y="50" width="180" height="90" rx="0" fill="#f9f9f9" stroke="none"/>
  <text x="40" y="68" font-family="monospace" font-size="9" fill="#333" font-weight="bold">Scenario 1A</text>
  <rect x="40" y="76" width="155" height="14" rx="2" fill="#e8e8e8"/>
  <text x="48" y="86" font-family="monospace" font-size="7" fill="#666">msg bubble</text>
  <rect x="40" y="94" width="155" height="14" rx="2" fill="#e8e8e8"/>
  <text x="48" y="104" font-family="monospace" font-size="7" fill="#666">msg bubble</text>
  <rect x="40" y="112" width="155" height="14" rx="2" fill="#e8e8e8"/>
  <text x="48" y="122" font-family="monospace" font-size="7" fill="#666">msg bubble</text>

  <text x="120" y="152" font-family="monospace" font-size="8" text-anchor="middle" fill="#dc2626">no border, no padding</text>

  <!-- arrow -->
  <text x="240" y="95" font-family="monospace" font-size="13" text-anchor="middle" fill="#888">&gt;</text>

  <!-- AFTER -->
  <text x="360" y="42" font-family="monospace" font-size="11" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER</text>

  <rect x="265" y="50" width="190" height="100" rx="10" fill="#fff" stroke="#fff" stroke-width="2">
  </rect>
  <!-- shadow simulation -->
  <rect x="267" y="52" width="186" height="96" rx="10" fill="none" stroke="#ddd" stroke-width="1"/>

  <text x="282" y="72" font-family="monospace" font-size="9" fill="#333" font-weight="bold">Scenario 1A</text>
  <rect x="282" y="80" width="155" height="14" rx="2" fill="#e8e8e8"/>
  <text x="290" y="90" font-family="monospace" font-size="7" fill="#666">msg bubble</text>
  <rect x="282" y="98" width="155" height="14" rx="2" fill="#e8e8e8"/>
  <text x="290" y="108" font-family="monospace" font-size="7" fill="#666">msg bubble</text>
  <rect x="282" y="116" width="155" height="14" rx="2" fill="#e8e8e8"/>
  <text x="290" y="126" font-family="monospace" font-size="7" fill="#666">msg bubble</text>

  <text x="360" y="166" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">border + padding + radius</text>
  <text x="360" y="178" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">+ box-shadow (card style)</text>

  <!-- CSS note -->
  <text x="240" y="196" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">.scenario { border:1px solid #fff; padding:18px; border-radius:10px; box-shadow }</text>
</svg>
