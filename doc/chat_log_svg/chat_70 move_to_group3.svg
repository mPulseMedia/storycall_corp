<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <rect x="0" y="0" width="500" height="250" fill="#fff"/>

  <text x="250" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_70 move_to_group3</text>
  <text x="250" y="36" font-family="monospace" font-size="10" text-anchor="middle" fill="#888">5 scenarios from group 6 into group 3</text>

  <!-- Group 6 box (source) -->
  <text x="95" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#dc2626" font-weight="bold">Group 6 (source)</text>
  <rect x="20" y="62" width="150" height="100" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="30" y="80" font-family="monospace" font-size="9" fill="#dc2626">6A  Grandma declines</text>
  <text x="30" y="94" font-family="monospace" font-size="9" fill="#dc2626">6B  Message queue</text>
  <text x="30" y="108" font-family="monospace" font-size="9" fill="#dc2626">6C  Wrong attachment</text>
  <text x="30" y="122" font-family="monospace" font-size="9" fill="#dc2626">6D  Unclear audio</text>
  <text x="30" y="136" font-family="monospace" font-size="9" fill="#dc2626">6E  Gma calls back</text>

  <!-- Arrows from group 6 to group 3 -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>
  <line x1="170" y1="80" x2="310" y2="108" stroke="#6366f1" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="170" y1="94" x2="310" y2="122" stroke="#6366f1" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="170" y1="108" x2="310" y2="136" stroke="#6366f1" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="170" y1="122" x2="310" y2="150" stroke="#6366f1" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="170" y1="136" x2="310" y2="164" stroke="#6366f1" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- Mapping labels -->
  <text x="250" y="74" font-family="monospace" font-size="7" text-anchor="middle" fill="#6366f1">6A-&gt;3C</text>
  <text x="250" y="88" font-family="monospace" font-size="7" text-anchor="middle" fill="#6366f1">6B-&gt;3D</text>
  <text x="250" y="102" font-family="monospace" font-size="7" text-anchor="middle" fill="#6366f1">6C-&gt;3E</text>
  <text x="250" y="116" font-family="monospace" font-size="7" text-anchor="middle" fill="#6366f1">6D-&gt;3F</text>
  <text x="250" y="130" font-family="monospace" font-size="7" text-anchor="middle" fill="#6366f1">6E-&gt;3G</text>

  <!-- Group 3 box (destination) -->
  <text x="395" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">Group 3 (dest)</text>
  <rect x="310" y="62" width="170" height="116" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="320" y="80" font-family="monospace" font-size="9" fill="#555">3A  (existing)</text>
  <text x="320" y="94" font-family="monospace" font-size="9" fill="#555">3B  (existing)</text>
  <text x="320" y="108" font-family="monospace" font-size="9" fill="#16a34a">3C  Grandma declines</text>
  <text x="320" y="122" font-family="monospace" font-size="9" fill="#16a34a">3D  Message queue</text>
  <text x="320" y="136" font-family="monospace" font-size="9" fill="#16a34a">3E  Wrong attachment</text>
  <text x="320" y="150" font-family="monospace" font-size="9" fill="#16a34a">3F  Unclear audio</text>
  <text x="320" y="164" font-family="monospace" font-size="9" fill="#16a34a">3G  Gma calls back</text>

  <!-- Annotations -->
  <rect x="20" y="172" width="150" height="20" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="0.5"/>
  <text x="95" y="186" font-family="monospace" font-size="8" text-anchor="middle" fill="#dc2626">Group 6 removed (empty)</text>

  <text x="250" y="220" font-family="monospace" font-size="8" text-anchor="middle" fill="#555">All step IDs renumbered to match new positions</text>
  <text x="250" y="236" font-family="monospace" font-size="8" text-anchor="middle" fill="#555">Group 3 grows from 2 to 7 scenarios</text>
</svg>