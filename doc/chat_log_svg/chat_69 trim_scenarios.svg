<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <rect x="0" y="0" width="500" height="250" fill="#fff"/>

  <text x="250" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_69 trim_scenarios</text>
  <text x="250" y="36" font-family="monospace" font-size="10" text-anchor="middle" fill="#888">Group 6: 6 scenarios to 5</text>

  <!-- BEFORE box -->
  <text x="125" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#999" font-weight="bold">BEFORE (6 scenarios)</text>
  <rect x="25" y="62" width="200" height="140" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="35" y="80" font-family="monospace" font-size="9" fill="#555">6A  Grandma declines</text>
  <text x="35" y="94" font-family="monospace" font-size="9" fill="#555">6B  Message queue</text>
  <text x="35" y="108" font-family="monospace" font-size="9" fill="#dc2626">6C  Wrong attachment</text>
  <text x="175" y="108" font-family="monospace" font-size="7" fill="#dc2626">(6C4 del)</text>
  <text x="35" y="122" font-family="monospace" font-size="9" fill="#dc2626">6D  Unclear audio</text>
  <text x="175" y="122" font-family="monospace" font-size="7" fill="#dc2626">(6D4 del)</text>
  <text x="35" y="136" font-family="monospace" font-size="9" fill="#dc2626" text-decoration="line-through">6E  Two kids same gma</text>
  <text x="175" y="136" font-family="monospace" font-size="7" fill="#dc2626">(removed)</text>
  <text x="35" y="150" font-family="monospace" font-size="9" fill="#6366f1">6F  Grandma calls back</text>

  <!-- Arrow -->
  <line x1="240" y1="130" x2="270" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- AFTER box -->
  <text x="380" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER (5 scenarios)</text>
  <rect x="280" y="62" width="200" height="120" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="290" y="80" font-family="monospace" font-size="9" fill="#555">6A  Grandma declines</text>
  <text x="290" y="94" font-family="monospace" font-size="9" fill="#555">6B  Message queue</text>
  <text x="290" y="108" font-family="monospace" font-size="9" fill="#555">6C  Wrong attachment</text>
  <text x="290" y="122" font-family="monospace" font-size="9" fill="#555">6D  Unclear audio</text>
  <text x="290" y="136" font-family="monospace" font-size="9" fill="#6366f1">6E  Grandma calls back</text>

  <!-- Annotations -->
  <rect x="280" y="186" width="200" height="14" rx="2" fill="#ede9fe" stroke="none"/>
  <text x="380" y="196" font-family="monospace" font-size="8" text-anchor="middle" fill="#6366f1">6F renamed to 6E</text>

  <text x="125" y="218" font-family="monospace" font-size="8" text-anchor="middle" fill="#dc2626">steps 6C4, 6D4 deleted</text>
  <text x="125" y="232" font-family="monospace" font-size="8" text-anchor="middle" fill="#dc2626">scenario 6E fully removed</text>
  <text x="380" y="218" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">steps and IDs renumbered</text>
</svg>