<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <rect x="0" y="0" width="500" height="250" fill="#fff"/>

  <text x="250" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_53 reorder_fields</text>
  <text x="250" y="36" font-family="monospace" font-size="10" text-anchor="middle" fill="#888">doc/_reorder.js on scenarios.js</text>

  <!-- BEFORE box -->
  <text x="125" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#999" font-weight="bold">BEFORE</text>

  <rect x="20" y="62" width="210" height="120" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="30" y="78" font-family="monospace" font-size="9" fill="#dc2626" font-weight="bold">key order:</text>
  <text x="30" y="92" font-family="monospace" font-size="9" fill="#b91c1c">1. channel</text>
  <text x="30" y="104" font-family="monospace" font-size="9" fill="#b91c1c">2. from</text>
  <text x="30" y="116" font-family="monospace" font-size="9" fill="#b91c1c">3. to</text>
  <text x="30" y="128" font-family="monospace" font-size="9" fill="#b91c1c">4. format</text>
  <text x="30" y="140" font-family="monospace" font-size="9" fill="#b91c1c">5. id</text>
  <text x="30" y="152" font-family="monospace" font-size="9" fill="#b91c1c">6. text</text>
  <text x="30" y="170" font-family="monospace" font-size="8" fill="#999">metadata first</text>

  <!-- arrow -->
  <line x1="240" y1="120" x2="268" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- AFTER box -->
  <text x="375" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER</text>

  <rect x="270" y="62" width="210" height="120" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="280" y="78" font-family="monospace" font-size="9" fill="#16a34a" font-weight="bold">key order:</text>
  <text x="280" y="92" font-family="monospace" font-size="9" fill="#15803d" font-weight="bold">1. id</text>
  <text x="280" y="104" font-family="monospace" font-size="9" fill="#15803d" font-weight="bold">2. text</text>
  <text x="280" y="116" font-family="monospace" font-size="9" fill="#555">3. channel</text>
  <text x="280" y="128" font-family="monospace" font-size="9" fill="#555">4. from</text>
  <text x="280" y="140" font-family="monospace" font-size="9" fill="#555">5. to</text>
  <text x="280" y="152" font-family="monospace" font-size="9" fill="#555">6. format</text>
  <text x="280" y="170" font-family="monospace" font-size="8" fill="#16a34a">identity first</text>

  <!-- transformation box -->
  <rect x="130" y="198" width="240" height="36" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="250" y="214" font-family="monospace" font-size="9" text-anchor="middle" fill="#1d4ed8" font-weight="bold">_reorder.js transformation</text>
  <text x="250" y="226" font-family="monospace" font-size="8" text-anchor="middle" fill="#3b82f6">id, text promoted to top of each step</text>
</svg>