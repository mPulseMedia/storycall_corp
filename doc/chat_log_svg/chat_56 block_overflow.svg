<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <rect x="0" y="0" width="500" height="250" fill="#fff"/>

  <text x="250" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_56 block_overflow</text>
  <text x="250" y="36" font-family="monospace" font-size="10" text-anchor="middle" fill="#888">.block: padding:14px to overflow:hidden</text>

  <!-- BEFORE -->
  <text x="125" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#999" font-weight="bold">BEFORE (padding:14px)</text>

  <!-- Block with padding visible -->
  <rect x="25" y="62" width="200" height="130" rx="10" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>

  <!-- Padding indicator - left -->
  <line x1="25" y1="80" x2="39" y2="80" stroke="#e2a52e" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="32" y="72" font-family="monospace" font-size="7" fill="#e2a52e" text-anchor="middle">14</text>
  <!-- Padding indicator - top -->
  <line x1="40" y1="62" x2="40" y2="76" stroke="#e2a52e" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Content area with gap from border -->
  <rect x="39" y="76" width="172" height="30" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="125" y="94" font-family="monospace" font-size="9" text-anchor="middle" fill="#1e40af">content</text>

  <rect x="39" y="112" width="172" height="30" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="125" y="130" font-family="monospace" font-size="9" text-anchor="middle" fill="#1e40af">content</text>

  <!-- Padding annotation -->
  <rect x="39" y="152" width="172" height="18" rx="2" fill="#fef9c3" stroke="#e2a52e" stroke-width="0.5"/>
  <text x="125" y="164" font-family="monospace" font-size="8" text-anchor="middle" fill="#92400e">padding: 14px</text>

  <!-- Arrow -->
  <line x1="235" y1="127" x2="268" y2="127" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- AFTER -->
  <text x="375" y="56" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER (overflow:hidden)</text>

  <!-- Block with no padding - content flush -->
  <rect x="275" y="62" width="200" height="130" rx="10" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>

  <!-- Content flush against border -->
  <rect x="275" y="76" width="200" height="30" rx="0" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
  <text x="375" y="94" font-family="monospace" font-size="9" text-anchor="middle" fill="#15803d">content (flush)</text>

  <rect x="275" y="112" width="200" height="30" rx="0" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
  <text x="375" y="130" font-family="monospace" font-size="9" text-anchor="middle" fill="#15803d">content (flush)</text>

  <!-- overflow annotation -->
  <rect x="289" y="152" width="172" height="18" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="0.5"/>
  <text x="375" y="164" font-family="monospace" font-size="8" text-anchor="middle" fill="#15803d">overflow: hidden</text>

  <!-- CSS change box -->
  <rect x="110" y="206" width="280" height="34" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="250" y="220" font-family="monospace" font-size="9" text-anchor="middle" fill="#dc2626"><tspan text-decoration="line-through">padding: 14px</tspan></text>
  <text x="250" y="232" font-family="monospace" font-size="9" text-anchor="middle" fill="#16a34a">overflow: hidden (clips to border-radius)</text>
</svg>