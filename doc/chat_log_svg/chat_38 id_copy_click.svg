<svg xmlns="http://www.w3.org/2000/svg" width="480" height="170" style="background:#fff">
  <rect x="0" y="0" width="480" height="170" fill="#fff"/>

  <text x="240" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_38 id_copy_click</text>

  <!-- bubble with cursor -->
  <rect x="40" y="38" width="180" height="36" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="130" y="60" font-family="monospace" font-size="9" text-anchor="middle" fill="#14532d">Hi Grandma...</text>
  <text x="195" y="52" font-family="monospace" font-size="7" fill="#666">3C1</text>

  <!-- cursor icon -->
  <text x="230" y="60" font-family="monospace" font-size="11" fill="#555">tap</text>

  <!-- arrow -->
  <line x1="260" y1="56" x2="290" y2="56" stroke="#555" stroke-width="1.5" marker-end="url(#arr38)"/>
  <defs><marker id="arr38" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#555"/></marker></defs>

  <!-- clipboard -->
  <rect x="300" y="40" width="140" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="370" y="59" font-family="monospace" font-size="10" text-anchor="middle" fill="#1e40af">"3C1"</text>
  <text x="370" y="50" font-family="monospace" font-size="7" text-anchor="middle" fill="#888">clipboard</text>

  <!-- event row example -->
  <rect x="40" y="88" width="180" height="28" rx="3" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="130" y="105" font-family="monospace" font-size="8" text-anchor="middle" fill="#999" font-style="italic">1 hour later</text>
  <text x="195" y="100" font-family="monospace" font-size="7" fill="#666">3C7</text>
  <text x="230" y="106" font-family="monospace" font-size="11" fill="#555">tap</text>
  <line x1="260" y1="102" x2="290" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arr38)"/>
  <rect x="300" y="88" width="140" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="370" y="97" font-family="monospace" font-size="7" text-anchor="middle" fill="#888">clipboard</text>
  <text x="370" y="107" font-family="monospace" font-size="10" text-anchor="middle" fill="#1e40af">"3C7"</text>

  <!-- files -->
  <text x="240" y="138" font-family="monospace" font-size="9" text-anchor="middle" fill="#555">click .bubble / .event_row → copy "ID"</text>
  <rect x="100" y="146" width="130" height="16" rx="5" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="165" y="158" font-family="monospace" font-size="8" text-anchor="middle" fill="#333">scenarios.html</text>
  <rect x="250" y="146" width="130" height="16" rx="5" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="315" y="158" font-family="monospace" font-size="8" text-anchor="middle" fill="#333">scenarios.css</text>
</svg>
