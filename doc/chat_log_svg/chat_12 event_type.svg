<svg xmlns="http://www.w3.org/2000/svg" width="460" height="200" style="background:#fff">
  <rect x="0" y="0" width="460" height="200" fill="#fff"/>

  <text x="230" y="24" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_12 event_type</text>

  <!-- Before -->
  <text x="115" y="50" font-family="monospace" font-size="11" text-anchor="middle" fill="#c53929" font-weight="bold">Before</text>

  <rect x="15" y="60" width="210" height="65" rx="4" fill="#fce8e6" stroke="#c53929" stroke-width="1"/>
  <text x="25" y="80" font-family="monospace" font-size="9" fill="#a02919">"type": "time_passes"</text>
  <text x="25" y="96" font-family="monospace" font-size="9" fill="#a02919">.time_row</text>
  <text x="25" y="114" font-family="monospace" font-size="8" fill="#888">Only for time delays</text>

  <!-- Arrow -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
  <line x1="233" y1="92" x2="243" y2="92" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- After -->
  <text x="350" y="50" font-family="monospace" font-size="11" text-anchor="middle" fill="#34a853" font-weight="bold">After</text>

  <rect x="250" y="60" width="200" height="65" rx="4" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
  <text x="260" y="80" font-family="monospace" font-size="9" fill="#1b7a2b">"type": "event"</text>
  <text x="260" y="96" font-family="monospace" font-size="9" fill="#1b7a2b">.event_row</text>
  <text x="260" y="114" font-family="monospace" font-size="8" fill="#1b7a2b">Time, calls, no answer...</text>

  <!-- Files -->
  <rect x="15" y="150" width="130" height="28" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="80" y="169" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">scenarios.js</text>
  <rect x="160" y="150" width="140" height="28" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="230" y="169" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">scenarios.css</text>
  <rect x="315" y="150" width="135" height="28" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="382" y="169" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">scenarios.html</text>
</svg>
