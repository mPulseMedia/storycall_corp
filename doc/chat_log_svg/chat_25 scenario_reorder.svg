<svg xmlns="http://www.w3.org/2000/svg" width="480" height="210" style="background:#fff">
  <rect x="0" y="0" width="480" height="210" fill="#fff"/>

  <text x="240" y="24" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_25 scenario_reorder</text>

  <!-- 3A/3B swap -->
  <text x="140" y="50" font-family="monospace" font-size="10" text-anchor="middle" fill="#555" font-weight="bold">3A ↔ 3B swap</text>

  <rect x="20" y="58" width="120" height="22" rx="3" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
