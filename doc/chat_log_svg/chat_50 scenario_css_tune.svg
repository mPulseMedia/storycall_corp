<svg xmlns="http://www.w3.org/2000/svg" width="480" height="230" style="background:#fff">
  <rect x="0" y="0" width="480" height="230" fill="#fff"/>

  <text x="240" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_50 scenario_css_tune</text>

  <!-- .scenario border changes -->
  <text x="240" y="42" font-family="monospace" font-size="10" text-anchor="middle" fill="#555" font-weight="bold">.scenario border + padding</text>

  <!-- BEFORE -->
  <text x="120" y="60" font-family="monospace" font-size="10" text-anchor="middle" fill="#999" font-weight="bold">BEFORE</text>

  <rect x="30" y="68" width="180" height="50" rx="10" fill="#fff" stroke="#fff" stroke-width="2"/>
  <rect x="32" y="70" width="176" height="46" rx="10" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="86" font-family="monospace" font-size="8" fill="#333" font-weight="bold">Scenario</text>
  <text x="50" y="98" font-family="monospace" font-size="7" fill="#888">padding: 18px</text>
  <text x="50" y="108" font-family="monospace" font-size="7" fill="#888">border: #fff</text>

  <!-- arrow -->
  <text x="240" y="95" font-family="monospace" font-size="13" text-anchor="middle" fill="#888">&gt;</text>

  <!-- AFTER -->
  <text x="360" y="60" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER</text>

  <rect x="270" y="68" width="180" height="50" rx="10" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="290" y="86" font-family="monospace" font-size="8" fill="#333" font-weight="bold">Scenario</text>
  <text x="290" y="98" font-family="monospace" font-size="7" fill="#16a34a">padding: 14px</text>
  <text x="290" y="108" font-family="monospace" font-size="7" fill="#16a34a">border: #eee</text>

  <!-- .msg border-radius change -->
  <text x="240" y="142" font-family="monospace" font-size="10" text-anchor="middle" fill="#555" font-weight="bold">.msg rows get border-radius</text>

  <!-- BEFORE msg -->
  <text x="120" y="158" font-family="monospace" font-size="10" text-anchor="middle" fill="#999" font-weight="bold">BEFORE</text>

  <rect x="40" y="164" width="160" height="18" rx="0" fill="#e8e8e8" stroke="none"/>
  <text x="48" y="176" font-family="monospace" font-size="7" fill="#666">msg row (sharp corners)</text>

  <rect x="40" y="186" width="160" height="18" rx="0" fill="#e8e8e8" stroke="none"/>
  <text x="48" y="198" font-family="monospace" font-size="7" fill="#666">msg row (sharp corners)</text>

  <!-- arrow -->
  <text x="240" y="185" font-family="monospace" font-size="13" text-anchor="middle" fill="#888">&gt;</text>

  <!-- AFTER msg -->
  <text x="360" y="158" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER</text>

  <rect x="280" y="164" width="160" height="18" rx="12" fill="#e8e8e8" stroke="none"/>
  <text x="288" y="176" font-family="monospace" font-size="7" fill="#666">msg row (12px radius)</text>

  <rect x="280" y="186" width="160" height="18" rx="12" fill="#e8e8e8" stroke="none"/>
  <text x="288" y="198" font-family="monospace" font-size="7" fill="#666">msg row (12px radius)</text>

  <!-- summary -->
  <text x="240" y="224" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">#fff->#eee border, 18->14px padding, .msg border-radius:12px</text>
</svg>
