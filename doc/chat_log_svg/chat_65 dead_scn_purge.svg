<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <rect x="0" y="0" width="500" height="250" fill="#fff"/>

  <text x="250" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_65 dead_scn_purge</text>

  <text x="250" y="38" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">codename_index.txt cleanup</text>

  <!-- Big 212 with strikethrough -->
  <rect x="40" y="55" width="160" height="120" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="120" y="78" font-family="monospace" font-size="10" text-anchor="middle" fill="#dc2626" font-weight="bold">REMOVED</text>
  <text x="120" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="#dc2626" font-weight="bold">scn_ entries</text>
  <text x="120" y="110" font-family="monospace" font-size="11" text-anchor="middle" fill="#b91c1c" font-weight="bold" text-decoration="line-through">212</text>
  <!-- big number overlay -->
  <text x="120" y="112" font-family="monospace" font-size="40" text-anchor="middle" fill="#dc2626" opacity="0.15" font-weight="bold">212</text>
  <line x1="85" y1="108" x2="155" y2="108" stroke="#dc2626" stroke-width="2"/>
  <text x="120" y="165" font-family="monospace" font-size="9" text-anchor="middle" fill="#999">dead scenario codenames</text>

  <!-- Arrow -->
  <line x1="210" y1="115" x2="280" y2="115" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
  <text x="245" y="108" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">purge</text>

  <!-- Cleaned index -->
  <rect x="290" y="55" width="170" height="120" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="375" y="78" font-family="monospace" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">CLEANED INDEX</text>
  <text x="375" y="98" font-family="monospace" font-size="9" text-anchor="middle" fill="#14532d">codename_index.txt</text>
  <line x1="310" y1="106" x2="440" y2="106" stroke="#16a34a" stroke-width="0.5"/>
  <text x="375" y="120" font-family="monospace" font-size="9" text-anchor="middle" fill="#14532d">scn_ entries: 0</text>
  <text x="375" y="136" font-family="monospace" font-size="9" text-anchor="middle" fill="#14532d">remaining entries</text>
  <text x="375" y="150" font-family="monospace" font-size="9" text-anchor="middle" fill="#14532d">intact</text>

  <!-- Summary -->
  <rect x="80" y="200" width="340" height="30" rx="4" fill="#f0f9ff" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="250" y="218" font-family="monospace" font-size="10" text-anchor="middle" fill="#1e40af">212 dead scn_ codenames removed from index</text>
