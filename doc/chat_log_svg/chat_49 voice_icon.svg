<svg xmlns="http://www.w3.org/2000/svg" width="480" height="180" style="background:#fff">
  <rect x="0" y="0" width="480" height="180" fill="#fff"/>

  <text x="240" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_49 voice_icon</text>

  <!-- BEFORE -->
  <text x="120" y="44" font-family="monospace" font-size="11" text-anchor="middle" fill="#999" font-weight="bold">BEFORE</text>

  <rect x="30" y="54" width="180" height="60" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="70" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">voice bubble</text>

  <rect x="50" y="78" width="80" height="20" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="90" y="91" font-family="monospace" font-size="8" text-anchor="middle" fill="#4338ca">voice . 15s</text>

  <text x="120" y="132" font-family="monospace" font-size="8" text-anchor="middle" fill="#dc2626">text badge "voice . 15s"</text>

  <!-- arrow -->
  <text x="240" y="88" font-family="monospace" font-size="13" text-anchor="middle" fill="#888">&gt;</text>

  <!-- AFTER -->
  <text x="360" y="44" font-family="monospace" font-size="11" text-anchor="middle" fill="#16a34a" font-weight="bold">AFTER</text>

  <rect x="270" y="54" width="180" height="60" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="360" y="70" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">voice bubble</text>

  <!-- microphone icon (simplified) -->
  <rect x="345" y="78" width="10" height="16" rx="5" fill="#6366f1" stroke="none"/>
  <line x1="344" y1="90" x2="356" y2="90" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="350" y1="90" x2="350" y2="97" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="346" y1="97" x2="354" y2="97" stroke="#6366f1" stroke-width="1" stroke-linecap="round"/>

  <text x="360" y="132" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">small mic icon</text>
  <text x="360" y="144" font-family="monospace" font-size="8" text-anchor="middle" fill="#16a34a">no text badge</text>

  <!-- note -->
  <text x="240" y="172" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">voice tag: text badge replaced with microphone icon</text>
</svg>
