<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <rect x="0" y="0" width="500" height="250" fill="#fff"/>

  <text x="250" y="20" font-family="monospace" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">chat_67 precursor_indent</text>

  <!-- Change 1: .precursor padding -->
  <text x="250" y="42" font-family="monospace" font-size="10" text-anchor="middle" fill="#555" font-weight="bold">1. .precursor padding</text>

  <rect x="30" y="52" width="180" height="50" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="40" y="68" font-family="monospace" font-size="10" fill="#999" font-weight="bold">BEFORE</text>
  <text x="40" y="84" font-family="monospace" font-size="9" fill="#dc2626">.precursor { padding: 0 }</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
  <line x1="220" y1="77" x2="270" y2="77" stroke="#888" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="280" y="52" width="195" height="50" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="290" y="68" font-family="monospace" font-size="10" fill="#16a34a" font-weight="bold">AFTER</text>
  <text x="290" y="84" font-family="monospace" font-size="9" fill="#14532d">.precursor { padding: 0 12px }</text>
  <text x="290" y="96" font-family="monospace" font-size="8" fill="#16a34a">adds horizontal indent</text>

  <!-- Change 2: .block border -->
  <text x="250" y="126" font-family="monospace" font-size="10" text-anchor="middle" fill="#555" font-weight="bold">2. .block border color (two steps)</text>

  <!-- Step 1 -->
  <rect x="30" y="138" width="120" height="50" rx="5" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="90" y="154" font-family="monospace" font-size="9" text-anchor="middle" fill="#999" font-weight="bold">border</text>
  <rect x="50" y="160" width="80" height="16" rx="3" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
  <text x="90" y="172" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">#fff</text>

  <line x1="160" y1="163" x2="195" y2="163" stroke="#888" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="177" y="155" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">step 1</text>

  <!-- Step 2 middle -->
  <rect x="200" y="138" width="120" height="50" rx="5" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="260" y="154" font-family="monospace" font-size="9" text-anchor="middle" fill="#888" font-weight="bold">border</text>
  <rect x="220" y="160" width="80" height="16" rx="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <text x="260" y="172" font-family="monospace" font-size="9" text-anchor="middle" fill="#fff">#bbb</text>

  <line x1="330" y1="163" x2="365" y2="163" stroke="#888" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="347" y="155" font-family="monospace" font-size="8" text-anchor="middle" fill="#888">step 2</text>

  <!-- Step 3 final -->
  <rect x="370" y="138" width="110" height="50" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="425" y="154" font-family="monospace" font-size="9" text-anchor="middle" fill="#16a34a" font-weight="bold">border</text>
  <rect x="390" y="160" width="70" height="16" rx="3" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <text x="425" y="172" font-family="monospace" font-size="9" text-anchor="middle" fill="#555">#ddd</text>

  <!-- Summary -->
  <rect x="60" y="210" width="380" height="30" rx="4" fill="#f0f9ff" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="250" y="222" font-family="monospace" font-size="9" text-anchor="middle" fill="#1e40af">.precursor indent + .block border: #fff &gt; #bbb &gt; #ddd</text>
  <text x="250" y="234" font-family="monospace" font-size="8" text-anchor="middle" fill="#3b82f6">CSS visual refinement</text>
</svg>