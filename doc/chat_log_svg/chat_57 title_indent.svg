<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" style="background:#fff">
  <style>
    text { font-family: monospace; fill: #222; }
    .title { font-size: 13px; font-weight: bold; }
    .label { font-size: 11px; }
    .small { font-size: 9px; fill: #666; }
  </style>

  <!-- Title -->
  <text x="250" y="24" text-anchor="middle" class="title">chat_57  title_indent</text>
  <text x="250" y="40" text-anchor="middle" class="small">.block h2 { padding: 0 12px }</text>

  <!-- BEFORE section -->
  <text x="125" y="68" text-anchor="middle" class="label" fill="#b00">BEFORE</text>

  <!-- Before block outline -->
  <rect x="30" y="78" width="190" height="110" rx="3" fill="none" stroke="#999" stroke-width="1"/>

  <!-- Before title flush left -->
  <rect x="30" y="78" width="190" height="28" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="34" y="97" class="label" font-weight="bold">Scenario Title</text>

  <!-- Flush indicator arrow -->
  <line x1="32" y1="108" x2="32" y2="118" stroke="#b00" stroke-width="1.5"/>
  <text x="38" y="118" class="small" fill="#b00">0px gap</text>

  <!-- Before content placeholder -->
  <rect x="42" y="120" width="140" height="14" rx="2" fill="#ddd"/>
  <rect x="42" y="140" width="120" height="14" rx="2" fill="#ddd"/>
  <rect x="42" y="160" width="150" height="14" rx="2" fill="#ddd"/>

  <!-- AFTER section -->
  <text x="375" y="68" text-anchor="middle" class="label" fill="#070">AFTER</text>

  <!-- After block outline -->
  <rect x="280" y="78" width="190" height="110" rx="3" fill="none" stroke="#999" stroke-width="1"/>

  <!-- After title indented -->
  <rect x="280" y="78" width="190" height="28" rx="3" fill="#d4edda" stroke="#999" stroke-width="1"/>
  <text x="296" y="97" class="label" font-weight="bold">Scenario Title</text>

  <!-- Indent indicator -->
  <line x1="282" y1="84" x2="282" y2="100" stroke="#070" stroke-width="1.5"/>
  <line x1="282" y1="92" x2="293" y2="92" stroke="#070" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="284" y="118" class="small" fill="#070">12px indent</text>

  <!-- After content placeholder -->
  <rect x="292" y="120" width="140" height="14" rx="2" fill="#ddd"/>
  <rect x="292" y="140" width="120" height="14" rx="2" fill="#ddd"/>
  <rect x="292" y="160" width="150" height="14" rx="2" fill="#ddd"/>

  <!-- Arrow between before and after -->
  <line x1="228" y1="133" x2="270" y2="133" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- File label -->
  <text x="250" y="218" text-anchor="middle" class="small">scenarios.css  .block h2</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#070"/>
    </marker>
  </defs>
</svg>