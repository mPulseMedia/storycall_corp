<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StoryCall Scenarios</title>
  <link rel="icon" href="image/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="site.css" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="scenarios.css" />
</head>
<body>
  <header>
    <div class="wrap">
      <div class="bar">
        <a class="brand" href="https://storycall.org" aria-label="StoryCall home">
          <img src="image/storycall_logo.png" alt="StoryCall logo" class="brand_logo" width="253" height="59" />
        </a>
        <a class="button_back" href="index.html">Back to home</a>
      </div>
    </div>
  </header>

  <main class="page">
    <h1>StoryCall Scenarios</h1>
    <nav class="nav" id="nav"></nav>
    <div id="out"></div>
  </main>

  <footer>
    <div class="wrap">
      <div class="footer_inner">
        <div class="copy">
          © <span id="year"></span> StoryCall
        </div>
      </div>
    </div>
  </footer>

  <script src="scenarios.js"></script>
  <script>
  const T = v => Array.isArray(v) ? v.join("") : (v ?? "");
  const E = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const NAMES = {kid:"Kid", storycall:"StoryCall", grandma:"Grandma"};
  const COL = {kid:0, storycall:1, grandma:2};

  const GROUPS = [
    { num:"1", label:"Perfect path",           ids:["1A"] },
    { num:"2", label:"Kids setup issues",       ids:["2A","2B","2C"] },
    { num:"3", label:"Message exchange issues",  ids:["3A","3B","3C"] },
    { num:"4", label:"Texting for help",         ids:["4A","4B","4C"] },
    { num:"5", label:"Texting to stop",          ids:["5A","5B"] },
  ];
  const IDS = GROUPS.flatMap(g => g.ids);

  function msgRow(step, parentCls) {
    const who = step.from || step.speaker || "storycall";
    const fmt = step.format || "text";
    const ch  = step.channel || "sms";

    const voiceCls = fmt === "voice" ? " bubble_voice" : "";
    const voiceTag = (fmt === "voice" && step.duration_s)
      ? `<span class="voice_tag">voice \u00b7 ${step.duration_s}s</span>`
      : "";
    const body = E(T(step.text));
    const mistakeHTML = step.mistakes
      ? step.mistakes.map(m => `<span class="mistake">\u26a0 ${E(m.message)}</span>`).join("")
      : "";
    const numHTML = step.id != null ? `<span class="step_num">${step.id}</span>` : "";

    /* storycall → blue; relayed grandma voice → orange; kid → green; grandma → orange */
    const relayed = step.derived_from && step.derived_from.via === "sms_audio_relay";
    const convCls = who === "storycall" && !relayed ? "bubble_sc"
      : relayed ? "bubble_phone"
      : who === "grandma" ? "bubble_phone"
      : "bubble_kid";
    const bubble = `<div class="bubble ${convCls}${voiceCls}">${numHTML}${voiceTag}${body}${mistakeHTML}</div>`;

    if (ch === "telephone" && who === "grandma") {
      /* grandma answers — grandma column only */
      return `<div class="${parentCls || "msg"}">
        <div class="cell cell_ek"></div>
        <div class="cell cell_es"></div>
        <div class="cell cell_gma">${bubble}</div>
      </div>`;
    }
    if (ch === "telephone") {
      /* storycall → grandma — SC + half grandma */
      return `<div class="${parentCls || "msg"}">
        <div class="cell cell_ek"></div>
        <div class="cell cell_sc_to_gma">${bubble}</div>
        <div class="cell cell_eg1"></div>
      </div>`;
    }
    if (who === "kid") {
      /* kid → storycall — kid column only */
      return `<div class="${parentCls || "msg"}">
        <div class="cell cell_kid">${bubble}</div>
        <div class="cell cell_es"></div>
        <div class="cell cell_eg"></div>
      </div>`;
    }
    /* storycall → kid — SC + half kid */
    return `<div class="${parentCls || "msg"}">
      <div class="cell cell_ek1"></div>
      <div class="cell cell_sc_to_kid">${bubble}</div>
      <div class="cell cell_eg"></div>
    </div>`;
  }

  function renderCall(call) {
    /* Render all parts as stacked bubbles spanning storycall + grandma */
    const parts = call.parts || [];
    let bubblesHTML = "";
    for (const part of parts) {
      const body = E(T(part.text));
      const numHTML = part.id != null ? `<span class="step_num">${part.id}</span>` : "";
      /* relayed kid voice → darker green; storycall voice → darker blue */
      const relayed = part.derived_from && part.derived_from.via === "telephone_playback";
      const cls = relayed ? "bubble bubble_kid bubble_voice" : "bubble bubble_sc bubble_voice";
      bubblesHTML += `<div class="${cls}">${numHTML}${body}</div>`;
    }

    return `<div class="msg">
      <div class="cell cell_ek"></div>
      <div class="cell cell_sc_to_gma call_parts">${bubblesHTML}</div>
      <div class="cell cell_eg1"></div>
    </div>`;
  }

  function renderScenario(sc, nextId) {
    const prec = [T(sc.precursor_group), T(sc.precursor)].filter(Boolean).join(" ");
    const precHTML = prec ? `<p class="precursor">${E(prec)}</p>` : "";

    let rows = "";
    for (const step of sc.steps) {
      if (step.type === "time_passes") {
        rows += `<div class="time_row">${E(step.label)}</div>`;
      } else if (step.channel === "telephone" && step.parts) {
        rows += renderCall(step);
      } else {
        rows += msgRow(step);
      }
    }

    const downHTML = nextId
      ? `<a class="sc_nav_arrow" href="#s_${nextId}" title="Next scenario">&darr;</a>`
      : "";

    return `<section class="scenario" id="s_${sc.scenario_id}">
      <div class="sc_hdr">
        <h2>${E(sc.title)}</h2>
        <span class="sc_nav">${downHTML}<a class="sc_nav_arrow" href="#" title="Back to top">&uarr;</a></span>
      </div>
      ${precHTML}
      <div class="lanes">
        <div class="lane_hdr lane_hdr_kid">Kid</div>
        <div class="lane_hdr lane_hdr_storycall">StoryCall</div>
        <div class="lane_hdr lane_hdr_grandma">Grandma</div>
        ${rows}
      </div>
    </section>`;
  }

  const data = SCENARIOS_DATA;

  /* outline nav */
  let navHTML = `<ul class="outline">`;
  for (const g of GROUPS) {
    navHTML += `<li><span class="outline_group">${g.num}. ${E(g.label)}</span><ol type="A">`;
    for (const id of g.ids) {
      const sc = data.scenarios[id];
      const shortTitle = sc.title.replace(/^\d+\.\w+\.\s*/, "");
      navHTML += `<li><a href="#s_${id}">${E(shortTitle)}</a></li>`;
    }
    navHTML += `</ol></li>`;
  }
  navHTML += `</ul>`;
  document.getElementById("nav").innerHTML = navHTML;

  document.getElementById("out").innerHTML = IDS
    .map((id, i) => renderScenario(data.scenarios[id], IDS[i + 1])).join("");

  document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
