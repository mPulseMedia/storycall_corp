<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StoryCall Scenarios</title>
  <link rel="icon" href="image/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="site.css" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="scenarios.css" />
</head>
<body>
  <header>
    <div class="wrap">
      <div class="bar">
        <a class="brand" href="https://storycall.org" aria-label="StoryCall home">
          <img src="image/storycall_logo.png" alt="StoryCall logo" class="brand_logo" width="253" height="59" />
        </a>
        <a class="button_back" href="index.html">&#8598; Back to home</a>
      </div>
    </div>
  </header>

  <main class="page">
    <h1>StoryCall Scenarios</h1>
    <p class="subtitle" id="subtitle"></p>
    <nav class="nav" id="nav"></nav>
    <div id="out"></div>
  </main>

  <footer>
    <div class="wrap">
      <div class="footer_inner">
        <div class="copy">
          © <span id="year"></span> StoryCall
        </div>
      </div>
    </div>
  </footer>

  <script src="scenarios.js"></script>
  <script>
  const text_get = v => Array.isArray(v) ? v.join("") : (v ?? "");
  const html_escape = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const NAMES = {kid:"Kid", storycall:"StoryCall", grandma:"Grandma"};
  const COL = {kid:0, storycall:1, grandma:2};

  const id_get = sc => sc.scenario_title.split(" ")[0];
  const GROUPS = SCENARIOS_DATA.groups;
  const ALL_SC = GROUPS.flatMap(g => g.group_scenarios);

  function msg_row_build(step, parentCls) {
    const who = step.from || step.speaker || "storycall";
    const fmt = step.format || "text";
    const ch  = step.channel || "sms";

    const voiceCls = fmt === "audio" ? " bubble_voice" : "";
    const voiceTag = fmt === "audio"
      ? `<span class="voice_tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></span>`
      : "";
    const body = html_escape(text_get(step.text));
    const mistakeHTML = step.mistakes
      ? step.mistakes.map(m => `<span class="mistake">\u26a0 ${html_escape(m.message)}</span>`).join("")
      : "";
    const numHTML = step.id != null ? `<span class="step_num">${step.id}</span>` : "";

    /* storycall → blue; relayed grandma voice/text → orange; kid → green; grandma → orange */
    const via = step.derived_from && step.derived_from.via;
    const relayed = via === "sms_audio_relay" || via === "sms_text_transcript";
    const convCls = who === "storycall" && !relayed ? "bubble_sc"
      : relayed ? "bubble_phone"
      : who === "grandma" ? "bubble_phone"
      : "bubble_kid";
    const bubble = `<div class="bubble ${convCls}${voiceCls}">${numHTML}${voiceTag}${body}${mistakeHTML}</div>`;

    if (ch === "telephone" && who === "grandma") {
      /* grandma answers — half SC + grandma */
      return `<div class="${parentCls || "msg"}">
        <div class="cell cell_ek"></div>
        <div class="cell cell_gma_to_sc">${bubble}</div>
      </div>`;
    }
    if (ch === "telephone") {
      /* storycall → grandma — SC + half grandma */
      return `<div class="${parentCls || "msg"}">
        <div class="cell cell_ek"></div>
        <div class="cell cell_sc_to_gma">${bubble}</div>
        <div class="cell cell_eg1"></div>
      </div>`;
    }
    if (who === "kid") {
      /* kid → storycall — kid + half SC */
      return `<div class="${parentCls || "msg"}">
        <div class="cell cell_kid_to_sc">${bubble}</div>
        <div class="cell cell_eg"></div>
      </div>`;
    }
    /* storycall → kid — SC + half kid */
    return `<div class="${parentCls || "msg"}">
      <div class="cell cell_ek1"></div>
      <div class="cell cell_sc_to_kid">${bubble}</div>
      <div class="cell cell_eg"></div>
    </div>`;
  }

  function call_render(call) {
    /* Render all parts as stacked bubbles spanning storycall + grandma */
    const parts = call.telephone_parts || [];
    let bubblesHTML = "";
    for (const part of parts) {
      const body = html_escape(text_get(part.text));
      const numHTML = part.id != null ? `<span class="step_num">${part.id}</span>` : "";
      /* relayed kid voice → darker green; storycall voice → darker blue */
      const relayed = part.derived_from && part.derived_from.via === "telephone_playback";
      const cls = relayed ? "bubble bubble_kid bubble_voice" : "bubble bubble_sc bubble_voice";
      bubblesHTML += `<div class="${cls}">${numHTML}${body}</div>`;
    }

    return `<div class="msg">
      <div class="cell cell_ek"></div>
      <div class="cell cell_sc_to_gma call_parts">${bubblesHTML}</div>
      <div class="cell cell_eg1"></div>
    </div>`;
  }

  function block_render(sc, nextId) {
    const prec = text_get(sc.scenario_precursor);
    const precHTML = prec ? `<p class="precursor">${html_escape(prec)}</p>` : "";

    let rows = "";
    let prevZone = null;
    for (const step of sc.scenario_steps) {
      const zone = step.type === "event" ? null
        : step.channel === "telephone" ? "gma" : "kid";
      if (zone && prevZone && zone !== prevZone) {
        rows += `<div class="zone_gap"></div>`;
      }
      if (zone) prevZone = zone;

      if (step.type === "event") {
        const evId = step.id != null ? `<span class="step_num">${step.id}</span>` : "";
        rows += `<div class="event_row">${evId}${html_escape(step.label)}</div>`;
      } else if (step.channel === "telephone" && step.telephone_parts) {
        rows += call_render(step);
      } else {
        rows += msg_row_build(step);
      }
    }

    const downHTML = nextId
      ? `<a class="block_nav_arrow" href="#s_${nextId}" title="Next block">&darr;</a>`
      : "";

    return `<section class="block" id="s_${id_get(sc)}">
      <div class="block_hdr">
        <h2>${html_escape(sc.scenario_title)}</h2>
        <span class="block_nav">${downHTML}<a class="block_nav_arrow" href="#" title="Back to top">&uarr;</a></span>
      </div>
      ${precHTML}
      <div class="lanes">
        <div class="lane_hdr lane_hdr_kid"><img src="image/face_kid.png" alt=""> Kid</div>
        <div class="lane_hdr lane_hdr_storycall">StoryCall</div>
        <div class="lane_hdr lane_hdr_grandma">Grandma <img src="image/face_granny.png" alt=""></div>
        ${rows}
      </div>
    </section>`;
  }

  /* subtitle from data */
  document.getElementById("subtitle").textContent = text_get(SCENARIOS_DATA.purpose);

  /* outline nav */
  let navHTML = `<ul class="outline">`;
  for (const g of GROUPS) {
    navHTML += `<li><span class="outline_group">${html_escape(g.group_title)}</span><ol type="A">`;
    for (const sc of g.group_scenarios) {
      const shortTitle = sc.scenario_title.replace(/^\w+\s+/, "");
      navHTML += `<li><a href="#s_${id_get(sc)}">${html_escape(shortTitle)}</a></li>`;
    }
    navHTML += `</ol></li>`;
  }
  navHTML += `</ul>`;
  document.getElementById("nav").innerHTML = navHTML;

  document.getElementById("out").innerHTML = ALL_SC
    .map((sc, i) => block_render(sc, ALL_SC[i + 1] ? id_get(ALL_SC[i + 1]) : null)).join("");

  document.getElementById("year").textContent = new Date().getFullYear();

  // __chat_38 __id_copy_click
  document.getElementById("out").addEventListener("click", function(e) {
    const el = e.target.closest(".bubble, .event_row");
    if (!el) return;
    const num = el.querySelector(".step_num");
    if (!num) return;
    const id = '"' + num.textContent.trim() + '"';
    navigator.clipboard.writeText(id);
  });
  </script>
</body>
</html>
